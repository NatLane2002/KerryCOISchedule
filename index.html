<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <meta name="theme-color" content="#0a1628" />
    <title>Kerry's COI Schedule</title>
    <base href="/KerryCOISchedule/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a1628'/%3E%3Cpath d='M8 22V10h3.2l3.4 8.2L18 10H21v12h-2.2v-7.4L15.6 22h-2.2l-3.2-7.4V22H8z' fill='%233d9b8f'/%3E%3C/svg%3E" />
  </head>
  <body>
    <div class="atmosphere" aria-hidden="true"></div>

    <div id="app" class="app">
      <header class="topbar">
        <div class="topbar__text">
          <p class="topbar__eyebrow" id="meta-line">Loading...</p>
          <h1 class="topbar__title">Kerry's COI Schedule</h1>
        </div>
      </header>

      <div class="toolbar">
        <label class="search">
          <span class="sr-only">Search</span>
          <svg class="search__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
            <path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input id="search" type="search" placeholder="Search customer, town, phone..." />
        </label>
        <nav class="tabs" role="tablist" aria-label="Schedule sections">
          <button type="button" class="tab is-active" role="tab" aria-selected="true" data-tab="route">Field route</button>
          <button type="button" class="tab" role="tab" aria-selected="false" data-tab="unblock">Unblock</button>
          <button type="button" class="tab" role="tab" aria-selected="false" data-tab="done">Done</button>
          <button type="button" class="tab" role="tab" aria-selected="false" data-tab="contacts">Contacts</button>
        </nav>
      </div>

      <section id="alerts" class="alerts" aria-label="Time-critical alerts"></section>

      <main class="main">
        <section id="panel-route" class="panel" role="tabpanel"></section>
        <section id="panel-unblock" class="panel" role="tabpanel" hidden></section>
        <section id="panel-done" class="panel" role="tabpanel" hidden></section>
        <section id="panel-contacts" class="panel" role="tabpanel" hidden></section>
        <p id="empty" class="empty" hidden>No matches. Try another search.</p>
      </main>

      <footer class="footer">
        <span id="footer-meta"></span>
        <span>Prepared for Kerry · Exploits · Private link — do not share widely</span>
      </footer>
    </div>

    <script src="assets/schedule-data.js"></script>
    <script src="assets/app.js"></script>
  </body>
</html>
